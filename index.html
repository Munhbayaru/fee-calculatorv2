<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Улсын тэмдэгтийн хураамжийн тооцоолуур</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 12px; color: #333; }
  .container { width: 100%; background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: #1a1a2e; }
  label { font-size: 13px; color: #666; display: block; margin-bottom: 5px; }
  select, input[type=number] { width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 7px; font-size: 14px; background: #fff; color: #333; margin-bottom: 14px; }
  select:focus, input:focus { outline: none; border-color: #3b82f6; }
  .result-card { background: #f0f4ff; border-radius: 10px; padding: 18px; margin-top: 20px; display: none; }
  .result-label { font-size: 13px; color: #555; margin-bottom: 6px; }
  .result-amount { font-size: 30px; font-weight: 700; color: #1a3a6b; }
  .divider { border: none; border-top: 1px solid #dde; margin: 14px 0; }
  .breakdown-row { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; border-bottom: 1px solid #e8e8e8; }
  .breakdown-row:last-child { border-bottom: none; }
  .breakdown-row span:first-child { color: #666; }
  .note { font-size: 12px; color: #888; margin-top: 10px; }
  .section-label { font-size: 12px; color: #3b82f6; font-weight: 600; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px; }
</style>
</head>
<body>
<div class="container">
  <h1>Улсын тэмдэгтийн хураамжийн тооцоолуур</h1>
  <p class="section-label">Иргэний шүүх</p>

  <label>Нэхэмжлэлийн төрөл</label>
  <select id="caseType" onchange="updateForm()">
    <option value="nonproperty">7.1.2 — Эд хөрөнгийн бус / үнэлэх боломжгүй</option>
    <option value="property">7.1.1 — Эд хөрөнгийн нэхэмжлэл (үнэлж болох)</option>
    <option value="enforcement">7.1.4 — Шийдвэр гүйцэтгэлийн гомдол</option>
    <option value="document">7.1.3 — Баримт бичгийн хуулбар / дахин олгох</option>
  </select>

  <div id="amountRow" style="display:none">
    <label>Нэхэмжлэлийн үнийн дүн (₮)</label>
    <input type="number" id="claimAmount" placeholder="Жишээ: 5,000,000" oninput="calculate()" min="0" />
  </div>

  <div id="pageRow" style="display:none">
    <label>Хуудасны тоо</label>
    <input type="number" id="pageCount" placeholder="Хуудас" oninput="calculate()" min="1" />
  </div>


  <div class="result-card" id="resultCard">
    <p class="result-label">Улсын тэмдэгтийн хураамж</p>
    <p class="result-amount" id="resultAmount">₮ 0</p>
    <hr class="divider">
    <div id="breakdown"></div>
    <p class="note" id="resultNote"></p>
  </div>
</div>

<script>
const MNT = v => '₮ ' + Math.round(v).toLocaleString();

function updateForm() {
  const t = document.getElementById('caseType').value;
  document.getElementById('amountRow').style.display = t === 'property' ? 'block' : 'none';
  document.getElementById('pageRow').style.display = t === 'document' ? 'block' : 'none';
  calculate();
}

function calcPropertyFee(a) {
  // 7.1.1 шатлалт хураамж
  if (a <= 130000) {
    return { fee: 4550, rows: [['0–130,000 (доод хэмжээ)', MNT(4550)]] };
  } else if (a <= 650000) {
    const extra = (a - 130000) * 0.03;
    const fee = 4550 + extra;
    return { fee, rows: [
      ['130,000 хүртэл (тогтмол)', MNT(4550)],
      ['130,001–650,000-ын давсан дүн × 3%', MNT(extra)]
    ]};
  } else if (a <= 1300000) {
    const extra = (a - 650000) * 0.024;
    const fee = 20150 + extra;
    return { fee, rows: [
      ['650,000 хүртэл (нийт)', MNT(20150)],
      ['650,001–1,300,000-ын давсан дүн × 2.4%', MNT(extra)]
    ]};
  } else if (a <= 13000000) {
    const extra = (a - 1300000) * 0.016;
    const fee = 35750 + extra;
    return { fee, rows: [
      ['1,300,000 хүртэл (нийт)', MNT(35750)],
      ['1,300,001–13,000,000-ын давсан дүн × 1.6%', MNT(extra)]
    ]};
  } else {
    const extra = (a - 13000000) * 0.005;
    const fee = 222950 + extra;
    return { fee, rows: [
      ['13,000,000 хүртэл (нийт)', MNT(222950)],
      ['13,000,001-ээс давсан дүн × 0.5%', MNT(extra)]
    ]};
  }
}

function calculate() {
  const type = document.getElementById('caseType').value;

  let fee = 0, rows = [], note = '';

  if (type === 'property') {
    const a = parseFloat(document.getElementById('claimAmount').value) || 0;
    if (a <= 0) { document.getElementById('resultCard').style.display = 'none'; return; }
    const r = calcPropertyFee(a);
    fee = r.fee; rows = r.rows;
    note = 'Хуулийн 7.1.1-ийн дагуу шатлалт хувиар тооцогдлоо.';

  } else if (type === 'nonproperty') {
    fee = 70200;
    rows = [['Эд хөрөнгийн бус / үнэлэх боломжгүй нэхэмжлэл (7.1.2)', MNT(70200)]];
    note = 'Хуулийн 7.1.2-т заасан тогтмол хэмжээ.';

  } else if (type === 'enforcement') {
    fee = 70200;
    rows = [['Шийдвэр гүйцэтгэлийн гомдол (7.1.4 → 7.1.2)', MNT(70200)]];
    note = 'Хуулийн 7.1.4-т заасны дагуу 7.1.2-ын хэмжээгээр тооцогдоно.';

  } else if (type === 'document') {
    const pages = parseInt(document.getElementById('pageCount').value) || 0;
    if (pages <= 0) { document.getElementById('resultCard').style.display = 'none'; return; }
    fee = pages * 100;
    rows = [
      ['Хуудасны тоо', pages + ' хуудас'],
      ['Нэг хуудасны хураамж', MNT(100)],
      ['Нийт', MNT(fee)]
    ];
    note = 'Хуулийн 7.1.3-т заасны дагуу хуудас тутамд 100 төгрөг.';
  }

  document.getElementById('resultAmount').textContent = MNT(fee);
  document.getElementById('resultNote').textContent = note;

  let html = '';
  rows.forEach(r => {
    html += `<div class="breakdown-row"><span>${r[0]}</span><span><strong>${r[1]}</strong></span></div>`;
  });
  document.getElementById('breakdown').innerHTML = html;
  document.getElementById('resultCard').style.display = 'block';
}

updateForm();

function sendHeight() {
  const h = document.body.scrollHeight;
  parent.postMessage({ iframeHeight: h }, '*');
}
new MutationObserver(sendHeight).observe(document.body, { childList: true, subtree: true, attributes: true });
window.addEventListener('load', sendHeight);
</script>
</body>
</html>
